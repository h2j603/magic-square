<head>
  <meta charset="UTF-8">
  <title>마방진 / Magic Square</title>

  <!-- Typekit -->

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --panel: #161616;
      --border: #222;
      --text: #fff;
      --muted: #444;
      --sub: #777;
      --accent: #554efe;
    }

    body {
      background: #111;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      font-size: 12px;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ─── 패널 ─── */
    #panel {
      width: 256px;
      flex-shrink: 0;
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }
    #panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    #panel-body::-webkit-scrollbar { width: 3px; }
    #panel-body::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }
    #panel-foot {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
    }

    /* ─── 타이포 ─── */
    .title { font-size: 16px; font-weight: 700; letter-spacing: -0.04em; }
    .sub { font-size: 9px; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; margin-top: 3px; }
    .lbl-sec { font-size: 9px; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 7px; }
    .lbl { color: var(--sub); }
    .val { color: var(--text); font-variant-numeric: tabular-nums; min-width: 38px; text-align: right; }

    /* ─── 섹션 ─── */
    .sec { display: flex; flex-direction: column; }
    .row { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 6px; }
    .divider { height: 1px; background: var(--border); }

    /* ─── 슬라이더 ─── */
    input[type=range] {
      -webkit-appearance: none;
      width: 100%; height: 2px;
      background: #252525; border-radius: 1px; outline: none;
      margin-bottom: 10px;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;

    /* ─── 탭 ─── */
    .tabs {

    .tab {

    /* ─── 색상 팔레트 ─── */
    .palette { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 10px; }
    .swatch { position: relative; width: 30px; height: 30px; }
    .swatch input[type=color] {
      width: 100%; height: 100%; border: none; border-radius: 6px;

    }
    .swatch input[type=color]::-webkit-color-swatch-wrapper { padding: 0; border-radius: 6px; }
    .swatch input[type=color]::-webkit-color-swatch { border: none; border-radius: 6px; }

      width: 30px; height: 30px; background: none;

      display: flex; align-items: center; justify-content: center;
    }

    /* ─── 라디오 ─── */
    .radio-stack { display: flex; flex-direction: column; gap: 7px; }
    .radio-item { display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .radio-item input { accent-color: var(--accent); cursor: pointer; }
    .radio-item label { color: var(--sub); cursor: pointer; }
    .radio-item input:checked + label { color: var(--text); }

    /* ─── 스위치 ─── */

    .sw-track {
      position: absolute; inset: 0;

    .sw-track::after {
      content: ''; position: absolute;

      top: 3px; left: 3px; transition: all 0.18s;
    }
    .sw input:checked + .sw-track { background: var(--accent); }
    .sw input:checked + .sw-track::after { transform: translateX(14px); background: #fff; }

    /* ─── 색상 입력 inline ─── */

    /* ─── 숫자 입력 ─── */

    /* ─── 캔버스 ─── */

<main id="stage"></main>

<script>
// ═══════════════════════════════════════════
// 전역 상태
// ═══════════════════════════════════════════
const S = {
  n: 3,
  sq: [],            // n×n 숫자 배열
  cellModes: [],     // n×n 셀별 폰트 모드 ('arabic'|'chinese')
  numMode: 'arabic', // 'arabic'|'chinese'|'random'
  palette: ['#554efe', '#8a6d4a'],
  bg: '#0d0d0d',
  textColorMode: 'auto',
  textColor: '#ffffff',
  gap: 3,
  radius: 0,
  padding: 48,
  fszMult: 1.0,
  colorMode: 'value',
  autoOn: false,
  autoSec: 3,
  _timer: null,
  recording: false,
  recChunks: [],
  recCount: 0,
  recMax: 12,
  mediaRec: null,
};

const CS = 1080;

// ═══════════════════════════════════════════
// 마방진 알고리즘
// ═══════════════════════════════════════════

// 홀수: 시암법
function siamese(n) {
  const s = Array.from({length:n}, () => Array(n).fill(0));
  let r = 0, c = Math.floor(n / 2);
  for (let v = 1; v <= n * n; v++) {
    s[r][c] = v;
    const nr = (r - 1 + n) % n;
    const nc = (c + 1) % n;
    if (s[nr][nc] !== 0) r = (r + 1) % n;
    else { r = nr; c = nc; }
  }
  return s;
}

// 4의 배수: 이중짝수법
function doublyEven(n) {
  const s = Array.from({length:n}, () => Array(n).fill(0));
  let v = 1;
  for (let i = 0; i < n; i++)
    for (let j = 0; j < n; j++)
      s[i][j] = v++;
  for (let i = 0; i < n; i++) {
    for (let j = 0; j < n; j++) {
      const di = i % 4, dj = j % 4;
      const corner = (di === 0 || di === 3) && (dj === 0 || dj === 3);
      const inner  = (di === 1 || di === 2) && (dj === 1 || dj === 2);
      if (corner || inner) s[i][j] = n * n + 1 - s[i][j];
    }
  }
  return s;
}

// 단순짝수 (6, 10, ...): 분할+교환법
function singlyEven(n) {
  const m = n / 2;
  const q = siamese(m);
  const s = Array.from({length:n}, () => Array(n).fill(0));
  for (let i = 0; i < m; i++) {
    for (let j = 0; j < m; j++) {
      s[i][j]       = q[i][j];
      s[i][j + m]   = q[i][j] + 2 * m * m;
      s[i + m][j]   = q[i][j] + 3 * m * m;
      s[i + m][j + m] = q[i][j] + m * m;
    }
  }
  const k = Math.floor((n - 2) / 4);
  const mid = Math.floor(m / 2);
  for (let i = 0; i < m; i++) {
    // 왼쪽 k열 교환 (중간행 제외)
    for (let j = 0; j < k; j++) {
      if (i !== mid) sw(s, i, j, i + m, j);
    }
    // 중간행: j=1부터 k열 교환
    if (i === mid) {
      for (let j = 1; j <= k; j++) sw(s, i, j, i + m, j);
    }
  }
  // 오른쪽 k-1열 교환
  for (let i = 0; i < m; i++) {
    for (let j = n - k + 1; j < n; j++) sw(s, i, j, i + m, j);
  }
  return s;
}

function sw(s, r1, c1, r2, c2) {
  [s[r1][c1], s[r2][c2]] = [s[r2][c2], s[r1][c1]];
}

function genSquare(n) {
  if (n % 2 === 1)    return siamese(n);
  if (n % 4 === 0)    return doublyEven(n);
  return singlyEven(n);
}

// ═══════════════════════════════════════════
// 한자 변환
// ═══════════════════════════════════════════
const KN = ['','一','二','三','四','五','六','七','八','九'];

function toKanji(n) {
  if (n <= 9) return KN[n];
  if (n < 20) return '十' + (n % 10 ? KN[n % 10] : '');
  if (n < 100) {
    const t = Math.floor(n / 10), o = n % 10;
    return KN[t] + '十' + (o ? KN[o] : '');
  }
  const h = Math.floor(n / 100), rest = n % 100;
  let str = (h === 1 ? '百' : KN[h] + '百');
  if (rest >= 10) {
    const t = Math.floor(rest / 10), o = rest % 10;
    str += (t === 1 ? '十' : KN[t] + '十') + (o ? KN[o] : '');
  } else if (rest > 0) str += KN[rest];
  return str;
}

// ═══════════════════════════════════════════
// 색상 유틸
// ═══════════════════════════════════════════
function hexRGB(h) {
  return [
    parseInt(h.slice(1,3), 16),
    parseInt(h.slice(3,5), 16),
    parseInt(h.slice(5,7), 16),
  ];
}
function luminance([r,g,b]) { return (0.299*r + 0.587*g + 0.114*b) / 255; }

function cellBg(row, col, val) {
  const pal = S.palette;
  if (!pal.length) return '#222';
  const n = S.n, len = pal.length;
  switch (S.colorMode) {
    case 'value': {
      const idx = Math.floor((val - 1) * len / (n * n));
      return pal[Math.min(idx, len - 1)];
    }
    case 'checker': return pal[(row + col) % len];
    case 'row':     return pal[row % len];
    case 'col':     return pal[col % len];
    case 'quad': {
      const qr = row < Math.floor(n / 2) ? 0 : 1;
      const qc = col < Math.floor(n / 2) ? 0 : 1;
      return pal[(qr * 2 + qc) % len];
    }
    default: return pal[0];
  }
}

// ═══════════════════════════════════════════
// 셀 폰트 모드 생성
// ═══════════════════════════════════════════
function buildCellModes(n) {
  const modes = Array.from({length:n}, () => Array(n).fill('arabic'));
  if (S.numMode === 'chinese') {
    return Array.from({length:n}, () => Array(n).fill('chinese'));
  }
  if (S.numMode === 'random') {
    for (let r = 0; r < n; r++)
      for (let c = 0; c < n; c++)
        modes[r][c] = Math.random() < 0.5 ? 'arabic' : 'chinese';
  }
  return modes;
}

// ═══════════════════════════════════════════
// p5 스케치
// ═══════════════════════════════════════════
const sketch = p => {
  p.setup = () => {
    const cv = p.createCanvas(CS, CS);
    cv.parent('stage');
    cv.elt.style.cssText = 'max-width:100%;max-height:100%;display:block;';
    p.noLoop();

    // 폰트 로드 대기 후 첫 렌더
    S.sq = genSquare(S.n);
    S.cellModes = buildCellModes(S.n);

    const fontPromises = [
      document.fonts.load('400 40px "adhesive-nr-eight"'),
      document.fonts.load('900 40px "kozuka-mincho-pr6n"'),
    ];
    Promise.all(fontPromises)
      .catch(() => {}) // Typekit 로드 실패해도 일단 그리기
      .finally(() => p.redraw());
  };

  p.draw = () => {
    const [br,bg,bb] = hexRGB(S.bg);
    p.background(br, bg, bb);

    const n = S.n, sq = S.sq;
    const pad = S.padding, gap = S.gap, rad = S.radius;
    const gridW = CS - pad * 2;
    const cell = (gridW - gap * (n - 1)) / n;
    const ctx = p.drawingContext;

    p.noStroke();

    for (let r = 0; r < n; r++) {
      for (let c = 0; c < n; c++) {
        const val = sq[r][c];
        const x = pad + c * (cell + gap);
        const y = pad + r * (cell + gap);

        // 셀 배경
        const bgHex = cellBg(r, c, val);
        const [cr,cg,cb] = hexRGB(bgHex);
        p.fill(cr, cg, cb);
        if (rad > 0) p.rect(x, y, cell, cell, rad);
        else         p.rect(x, y, cell, cell);

        // 텍스트 색상
        let textColor;
        if (S.textColorMode === 'auto') {
          textColor = luminance([cr,cg,cb]) > 0.5 ? '#111111' : '#ffffff';
        } else {
          textColor = S.textColor;
        }

        // 셀별 폰트 모드
        const mode = S.cellModes[r] ? S.cellModes[r][c] : 'arabic';
        const str  = mode === 'chinese' ? toKanji(val) : String(val);

        ctx.save();
        ctx.fillStyle   = textColor;
        ctx.textAlign   = 'center';
        ctx.textBaseline = 'middle';

        if (mode === 'arabic') {
          const fsz = cell * S.fszMult * 0.46;
          ctx.font = `400 ${fsz}px "adhesive-nr-eight", sans-serif`;
          ctx.fillText(str, x + cell / 2, y + cell / 2 + fsz * 0.04);
        } else {
          const cLen = str.length;
          const scale = cLen === 1 ? 0.56 : cLen === 2 ? 0.44 : 0.32;
          const fsz   = cell * S.fszMult * scale;
          ctx.font = `900 ${fsz}px "kozuka-mincho-pr6n", serif`;
          ctx.fillText(str, x + cell / 2, y + cell / 2 + fsz * 0.03);
        }

        ctx.restore();
      }
    }
  };
};

window._P = new p5(sketch);

// ═══════════════════════════════════════════
// 재생성
// ═══════════════════════════════════════════
function regen() {
  S.sq = genSquare(S.n);
  S.cellModes = buildCellModes(S.n);
  window._P.redraw();
}

// ═══════════════════════════════════════════
// 컨트롤 바인딩
// ═══════════════════════════════════════════

// n 슬라이더
document.getElementById('n-range').addEventListener('input', function() {
  S.n = +this.value;
  document.getElementById('n-val').textContent = `${S.n} × ${S.n}`;
  regen();
});

// 슬라이더 헬퍼
function bindRange(id, dispId, setter, fmt) {
  const el = document.getElementById(id);
  const dp = document.getElementById(dispId);
  el.addEventListener('input', () => {
    const v = +el.value;
    if (dp) dp.textContent = fmt(v);
    setter(v);
  });
}
bindRange('gap-range', 'gap-val', v => { S.gap = v; window._P.redraw(); }, v => v+'px');
bindRange('rad-range', 'rad-val', v => { S.radius = v; window._P.redraw(); }, v => v+'px');
bindRange('pad-range', 'pad-val', v => { S.padding = v; window._P.redraw(); }, v => v+'px');
bindRange('fsz-range', 'fsz-val', v => { S.fszMult = v/75; window._P.redraw(); }, v => (v/75).toFixed(1)+'×');

// 배경색
document.getElementById('bg-pick').addEventListener('input', e => {
  S.bg = e.target.value; window._P.redraw();
});

// 폰트 색상
document.getElementById('tc-pick').addEventListener('input', e => {
  S.textColor = e.target.value; window._P.redraw();
});

// 자동 재생성
document.getElementById('auto-sw').addEventListener('change', function() {
  S.autoOn = this.checked;
  S.autoOn ? startAuto() : stopAuto();
});
document.getElementById('auto-sec').addEventListener('input', function() {
  S.autoSec = +this.value || 3;
  if (S.autoOn) { stopAuto(); startAuto(); }
});

function startAuto() {
  stopAuto();
  S._timer = setInterval(() => {
    regen(); // 캔버스 즉시 반영
    if (S.recording) {
      S.recCount++;
      document.getElementById('rec-cur').textContent = S.recCount;
      if (S.recCount >= S.recMax) stopVideo();
    }
  }, S.autoSec * 1000);
}

function stopAuto() {
  clearInterval(S._timer);
  S._timer = null;
}

// ═══════════════════════════════════════════
// 팔레트 UI
// ═══════════════════════════════════════════
function renderPalette() {
  const wrap = document.getElementById('palette');
  wrap.innerHTML = '';
  S.palette.forEach((col, i) => {
    const item = document.createElement('div');
    item.className = 'swatch';
    const inp = document.createElement('input');
    inp.type = 'color'; inp.value = col;
    inp.addEventListener('input', e => { S.palette[i] = e.target.value; window._P.redraw(); });
    if (S.palette.length > 1) {
      const del = document.createElement('button');
      del.className = 'swatch-del'; del.textContent = '×';
      del.onclick = () => { S.palette.splice(i, 1); renderPalette(); window._P.redraw(); };
      item.appendChild(del);
    }
    item.appendChild(inp);
    wrap.appendChild(item);
  });
  if (S.palette.length < 8) {
    const add = document.createElement('button');
    add.className = 'swatch-add'; add.textContent = '+';
    add.onclick = () => { S.palette.push('#ffffff'); renderPalette(); window._P.redraw(); };
    wrap.appendChild(add);
  }
}

// ═══════════════════════════════════════════
// 숫자 모드 / 색상 모드
// ═══════════════════════════════════════════
function setNumMode(m) {
  S.numMode = m;
  ['a','c','r'].forEach((id, i) => {
    document.getElementById('tab-'+id).classList.toggle('on', ['arabic','chinese','random'][i] === m);
  });
  // 랜덤 혼용 시 cellModes 재생성
  S.cellModes = buildCellModes(S.n);
  window._P.redraw();
}

function setCM(m) { S.colorMode = m; window._P.redraw(); }

function setTextColorMode(m) {
  S.textColorMode = m;
  document.getElementById('tc-auto').classList.toggle('on', m === 'auto');
  document.getElementById('tc-manual').classList.toggle('on', m === 'manual');
  document.getElementById('tc-pick-row').style.display = m === 'manual' ? 'flex' : 'none';
  window._P.redraw();
}

// ═══════════════════════════════════════════
// PNG 내보내기
// ═══════════════════════════════════════════
function exportPNG() {
  window._P.save('magic-square-' + Date.now() + '.png');
}

// ═══════════════════════════════════════════
// WebM 내보내기
// ═══════════════════════════════════════════
function toggleVideo() {
  if (S.recording) stopVideo();
  else startVideo();
}

function startVideo() {
  S.recMax = +document.getElementById('vid-n').value || 12;
  const canvas = document.querySelector('#stage canvas');
  if (!canvas) return;
  try {
    const types = ['video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm'];
    const mime = types.find(t => MediaRecorder.isTypeSupported(t)) || '';
    const stream = canvas.captureStream(30);
    S.mediaRec = new MediaRecorder(stream, mime ? {mimeType: mime} : {});
    S.recChunks = [];
    S.mediaRec.ondataavailable = e => { if (e.data.size > 0) S.recChunks.push(e.data); };
    S.mediaRec.onstop = () => {
      const blob = new Blob(S.recChunks, {type: 'video/webm'});
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href = url; a.download = 'magic-square-' + Date.now() + '.webm';
      a.click();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
      S.recording = false; S.recCount = 0;
      document.getElementById('rec-badge').classList.remove('on');
      document.getElementById('vid-btn').textContent = 'WebM 저장';
      if (!S.autoOn) stopAuto();
    };
    S.mediaRec.start(100);
    S.recording = true; S.recCount = 0;
    document.getElementById('rec-tot').textContent = S.recMax;
    document.getElementById('rec-cur').textContent = 0;
    document.getElementById('rec-badge').classList.add('on');
    document.getElementById('vid-btn').textContent = '● 녹화 중지';
    if (!S.autoOn) startAuto(); // 자동 재생성 없으면 녹화용으로 시작
  } catch(err) {
    console.error(err);
    alert('MediaRecorder 미지원 브라우저입니다. Chrome을 사용해주세요.');
  }
}

function stopVideo() {
  if (S.mediaRec && S.mediaRec.state !== 'inactive') S.mediaRec.stop();
  if (!S.autoOn) stopAuto();
}

// ═══════════════════════════════════════════
// 초기화
// ═══════════════════════════════════════════
renderPalette();
</script>
